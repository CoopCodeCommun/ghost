services:
  ghost:
    image: ghost:latest
    container_name: ghost-rtlx
    hostname: ghost-RTLx
    volumes:
      - ./config.production.json:/var/lib/ghost/config.production.json:z
      - ./ghost:/var/lib/ghost/content
    # environment:
      # NODE_ENV: production
    restart: unless-stopped
    networks:
      - frontend
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.routers.ghost-rtlx.tls.certresolver=myresolver
      - traefik.http.routers.ghost-rtlx.rule=Host(`$DOMAIN`) 
      - traefik.http.services.ghost.loadbalancer.server.port=2368
    depends_on:
      ghost-mysql:
        condition: service_healthy

  ghost-mysql:
    image: mysql:8
    container_name: ghost-mysql
    hostname: ghost-mysql
    volumes:
      - ./db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
      MYSQL_USER: user
      MYSQL_PASSWORD: $MYSQL_PASSWORD
      MYSQL_DATABASE: ghost
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - frontend


networks:
  frontend:
    external: true